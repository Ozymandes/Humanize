<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }

        .textarea-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .textarea-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .textarea-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .textarea-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        .apple-button {
            background: linear-gradient(180deg, #007AFF 0%, #0051D5 100%);
            transition: all 0.2s ease;
        }

        .apple-button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.35);
        }

        .apple-button:active {
            transform: scale(0.98);
        }

        .secondary-button {
            background: rgba(118, 118, 128, 0.12);
            transition: all 0.2s ease;
        }

        .secondary-button:hover {
            background: rgba(118, 118, 128, 0.2);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8edf2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="antialiased">
    <div class="min-h-screen flex flex-col">
        <!-- Navbar -->
        <nav class="glass-effect border-b border-gray-200/50 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex justify-center items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                            <span class="text-white font-bold text-lg">H</span>
                        </div>
                        <span class="text-2xl font-semibold text-gray-900 tracking-tight">Humanizer</span>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 px-6 py-8">
            <div class="max-w-7xl mx-auto">
                <!-- Main Card -->
                <div class="glass-effect rounded-3xl shadow-xl border border-white/20 overflow-hidden">
                    <div class="grid grid-cols-1 lg:grid-cols-2 divide-y lg:divide-y-0 lg:divide-x divide-gray-200/50">
                        <!-- Left Panel - Input -->
                        <div class="p-8 flex flex-col">
                            <div class="mb-4">
                                <h2 class="text-lg font-semibold text-gray-900 mb-1">Original Text</h2>
                                <p class="text-sm text-gray-500">Paste or type the text you want to humanize</p>
                            </div>

                            <!-- Action Buttons -->
                            <div class="flex gap-3 mb-4">
                                <button id="pasteBtn" class="secondary-button px-4 py-2.5 rounded-xl text-sm font-medium text-gray-800 inline-flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                                    </svg>
                                    Paste
                                </button>
                                <label class="secondary-button px-4 py-2.5 rounded-xl text-sm font-medium text-gray-800 inline-flex items-center gap-2 cursor-pointer">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                    </svg>
                                    Upload File
                                    <input type="file" id="fileInput" class="hidden" accept=".txt,.pdf,.docx">
                                </label>
                            </div>

                            <!-- Input Textarea -->
                            <div class="relative mb-4 flex-1">
                                <textarea
                                    id="inputText"
                                    class="textarea-scroll w-full h-full px-5 py-4 text-base text-gray-800 bg-white/50 border border-gray-300 rounded-2xl resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder:text-gray-400 leading-relaxed"
                                    placeholder="Enter your text here..."
                                ></textarea>

                                <div id="inputLoading" class="absolute inset-0 bg-white/80 backdrop-blur-sm rounded-2xl flex items-center justify-center hidden">
                                    <div class="flex flex-col items-center gap-3">
                                        <div class="w-12 h-12 border-4 border-gray-200 border-t-blue-500 rounded-full spinner"></div>
                                        <span class="text-sm font-medium text-gray-700">Processing...</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Word Count & Button -->
                            <div class="flex justify-between items-center mt-auto">
                                <div class="text-sm text-gray-500">
                                    <span id="inputWordCount" class="font-semibold text-gray-700">0</span> words · <span id="inputCharCount" class="font-semibold text-gray-700">0</span> characters
                                </div>
                                <button id="humanizeBtn" class="apple-button px-8 py-3 rounded-2xl text-white font-semibold text-base inline-flex items-center gap-2 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:transform-none" disabled>
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                    </svg>
                                    <span id="humanizeBtnText">Humanize</span>
                                </button>
                            </div>
                        </div>

                        <!-- Right Panel - Output -->
                        <div class="p-8 flex flex-col">
                            <div class="mb-4 flex justify-between items-center">
                                <div>
                                    <h2 class="text-lg font-semibold text-gray-900 mb-1">Humanized Text</h2>
                                    <p class="text-sm text-gray-500">Your humanized result will appear here</p>
                                </div>

                                <div class="flex gap-2">
                                    <button id="cleanBtn" class="secondary-button px-3 py-2 rounded-lg text-xs font-medium text-gray-700 inline-flex items-center gap-1.5 disabled:opacity-50" disabled title="Remove filler words">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                        </svg>
                                        Clean
                                    </button>
                                    <button id="copyBtn" class="secondary-button px-3 py-2 rounded-lg text-xs font-medium text-gray-700 inline-flex items-center gap-1.5 disabled:opacity-50" disabled>
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                        </svg>
                                        Copy
                                    </button>
                                    <button id="downloadBtn" class="secondary-button px-3 py-2 rounded-lg text-xs font-medium text-gray-700 inline-flex items-center gap-1.5 disabled:opacity-50" disabled>
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                        </svg>
                                        Download
                                    </button>
                                </div>
                            </div>

                            <!-- Output Panel -->
                            <div class="relative flex-1">
                                <div id="outputPanel" class="textarea-scroll w-full h-full px-5 py-4 text-base text-gray-800 bg-white border border-gray-200 rounded-2xl overflow-y-auto">
                                    <div id="outputPlaceholder" class="h-full flex items-center justify-center text-gray-400">
                                        <div class="text-center">
                                            <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                            </svg>
                                            <p class="text-base font-medium">Your humanized text will appear here</p>
                                        </div>
                                    </div>
                                    <div id="outputText" class="hidden whitespace-pre-wrap leading-relaxed"></div>
                                </div>

                                <div id="outputLoading" class="absolute inset-0 bg-white/80 backdrop-blur-sm rounded-2xl flex items-center justify-center hidden">
                                    <div class="flex flex-col items-center gap-3">
                                        <div class="w-12 h-12 border-4 border-gray-200 border-t-blue-500 rounded-full spinner"></div>
                                        <span class="text-sm font-medium text-gray-700">Humanizing...</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Output Stats -->
                            <div class="mt-4 flex justify-between items-center text-sm text-gray-500">
                                <span>Words: <span id="outputWordCount" class="font-semibold text-gray-700">0</span></span>
                                <span>Characters: <span id="outputCharCount" class="font-semibold text-gray-700">0</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 right-8 bg-gray-900 text-white px-6 py-4 rounded-2xl shadow-2xl transform translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3">
        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        <span id="toastMessage" class="text-sm font-medium"></span>
    </div>

    <script>
        // DOM Elements
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const outputPlaceholder = document.getElementById('outputPlaceholder');
        const outputPanel = document.getElementById('outputPanel');
        const humanizeBtn = document.getElementById('humanizeBtn');
        const humanizeBtnText = document.getElementById('humanizeBtnText');
        const pasteBtn = document.getElementById('pasteBtn');
        const fileInput = document.getElementById('fileInput');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const cleanBtn = document.getElementById('cleanBtn');
        const inputLoading = document.getElementById('inputLoading');
        const outputLoading = document.getElementById('outputLoading');
        const inputWordCount = document.getElementById('inputWordCount');
        const inputCharCount = document.getElementById('inputCharCount');
        const outputWordCount = document.getElementById('outputWordCount');
        const outputCharCount = document.getElementById('outputCharCount');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        let currentOutputText = '';

        // Word count
        function countWords(text) {
            return text.trim().split(/\s+/).filter(word => word.length > 0).length;
        }

        // Update UI state
        function updateUI() {
            const wordCount = countWords(inputText.value);
            const charCount = inputText.value.length;
            inputWordCount.textContent = wordCount.toLocaleString();
            inputCharCount.textContent = charCount.toLocaleString();
            humanizeBtn.disabled = wordCount === 0;
        }

        // Show toast
        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.remove('translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        // Humanize text
        async function humanizeText() {
            const text = inputText.value.trim();
            if (!text) return;

            inputLoading.classList.remove('hidden');
            outputLoading.classList.remove('hidden');
            humanizeBtn.disabled = true;
            humanizeBtnText.textContent = 'Humanizing...';

            try {
                const response = await fetch('/humanize-text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        seed: null,
                        intensity: 'intermediate'
                    })
                });

                if (!response.ok) throw new Error('Failed to humanize text');

                const data = await response.json();
                currentOutputText = data.humanized_text;

                outputText.textContent = currentOutputText;
                outputPlaceholder.classList.add('hidden');
                outputText.classList.remove('hidden');

                outputWordCount.textContent = countWords(currentOutputText).toLocaleString();
                outputCharCount.textContent = currentOutputText.length.toLocaleString();

                copyBtn.disabled = false;
                downloadBtn.disabled = false;
                cleanBtn.disabled = false;

                showToast('Text humanized successfully!');
            } catch (error) {
                showToast('Failed to humanize text');
            } finally {
                inputLoading.classList.add('hidden');
                outputLoading.classList.add('hidden');
                humanizeBtn.disabled = false;
                humanizeBtnText.textContent = 'Humanize';
                updateUI();
            }
        }

        // Clean text
        async function cleanText() {
            if (!currentOutputText) return;

            outputLoading.classList.remove('hidden');
            cleanBtn.disabled = true;

            try {
                const response = await fetch('/clean-text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: currentOutputText })
                });

                if (!response.ok) throw new Error('Failed to clean text');

                const data = await response.json();
                currentOutputText = data.cleaned_text;

                outputText.textContent = currentOutputText;
                outputWordCount.textContent = countWords(currentOutputText).toLocaleString();
                outputCharCount.textContent = currentOutputText.length.toLocaleString();

                showToast('Filler words removed!');
            } catch (error) {
                showToast('Failed to clean text');
            } finally {
                outputLoading.classList.add('hidden');
                cleanBtn.disabled = false;
            }
        }

        // Copy to clipboard
        async function copyToClipboard() {
            if (!currentOutputText) return;

            try {
                await navigator.clipboard.writeText(currentOutputText);
                showToast('Copied to clipboard!');
            } catch (error) {
                showToast('Failed to copy');
            }
        }

        // Download text
        function downloadText() {
            if (!currentOutputText) return;

            const blob = new Blob([currentOutputText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'humanized-text.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showToast('Downloaded!');
        }

        // Paste text
        async function pasteText() {
            try {
                const text = await navigator.clipboard.readText();
                inputText.value = text;
                updateUI();
                showToast('Text pasted!');
            } catch (error) {
                showToast('Failed to paste');
            }
        }

        // File upload - load text into editor for .txt files
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const validExtensions = ['.txt', '.pdf', '.docx'];
            const fileExt = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();

            if (!validExtensions.includes(fileExt)) {
                showToast('Invalid file type');
                return;
            }

            inputLoading.classList.remove('hidden');

            // For .txt files, load text into the editor
            if (fileExt === '.txt') {
                try {
                    const text = await file.text();
                    inputText.value = text;
                    updateUI();
                    showToast('File loaded into editor!');
                } catch (error) {
                    showToast('Failed to read file');
                } finally {
                    inputLoading.classList.add('hidden');
                    fileInput.value = '';
                }
                return;
            }

            // For .pdf and .docx files, process and download
            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/humanize', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Failed to process file');

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = file.name.replace(/\.[^.]+$/, '_humanized$&');
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showToast('File processed and downloaded!');
            } catch (error) {
                showToast('Failed to process file');
            } finally {
                inputLoading.classList.add('hidden');
                fileInput.value = '';
            }
        });

        // Event listeners
        inputText.addEventListener('input', updateUI);
        humanizeBtn.addEventListener('click', humanizeText);
        pasteBtn.addEventListener('click', pasteText);
        copyBtn.addEventListener('click', copyToClipboard);
        downloadBtn.addEventListener('click', downloadText);
        cleanBtn.addEventListener('click', cleanText);

        // Initialize
        updateUI();
    </script>
</body>
</html>
